services:
  - type: web
    name: trustcure-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PRIVATE_KEY
        sync: false
